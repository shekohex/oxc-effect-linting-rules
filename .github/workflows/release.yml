name: release
on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch: {}
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  release_please:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
  release_please_dev:
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.dev.json
          manifest-file: .release-please-manifest.json
          target-branch: dev
  publish_npm:
    needs: release_please
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      CI: "true"
    if: ${{ needs.release_please.outputs.release_created == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Specific Yarn Version
        run: corepack enable && corepack prepare yarn@4.6.0 --activate
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.11.1
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: yarn install --immutable
      - name: Test
        run: yarn test
      - name: Publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: npm publish --access public --provenance
  publish_npm_dev:
    needs: release_please_dev
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    env:
      CI: "true"
    if: github.ref_name == 'dev'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install Specific Yarn Version
        run: corepack enable && corepack prepare yarn@4.6.0 --activate
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.11.1
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: yarn install --immutable
      - name: Test
        run: yarn test
      - name: Publish dev if missing
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |-
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          case "$PACKAGE_VERSION" in
            *-dev*) ;;
            *) echo "Skipping non-dev version $PACKAGE_VERSION"; exit 0 ;;
          esac
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published"
            exit 0
          fi
          npm publish --tag dev --access public --provenance
